<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniArb Pro | Multi-Asset Arbitrage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:    oklch(0.1 0.02 260);
      --bg-card:    oklch(0.14 0.02 260);
      --bg-hover:   oklch(0.18 0.03 260);
      --border:     oklch(0.25 0.03 260);
      --text-primary:   oklch(0.95 0.01 260);
      --text-secondary: oklch(0.65 0.02 260);
      --text-muted:     oklch(0.45 0.02 260);
      --accent-cyan:    oklch(0.78 0.15 195);
      --accent-purple:  oklch(0.65 0.2 300);
      --accent-green:   oklch(0.75 0.18 150);
      --accent-red:     oklch(0.65 0.2 25);
      --glow-cyan:      oklch(0.78 0.15 195 / 0.3);
      --glow-green:     oklch(0.75 0.18 150 / 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg-deep);
      position: sticky; top: 0; z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800;
      box-shadow: 0 0 20px var(--glow-cyan);
    }
    .logo h1 {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .container { padding: 20px; max-width: 1600px; margin: 0 auto; }

    /* Top bar */
    .top-bar { display: flex; gap: 10px; margin-bottom: 24px; }
    .stat-pill {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 8px 14px; border-radius: 8px;
      font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
      display: flex; align-items: center; gap: 8px;
      color: var(--text-secondary);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); }

    /* Grid */
    .symbol-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 16px;
    }

    .symbol-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer; display: flex; flex-direction: column; gap: 16px;
      position: relative; overflow: hidden;
    }
    .symbol-card:hover { 
      border-color: var(--accent-cyan); transform: translateY(-4px);
      box-shadow: 0 12px 30px oklch(0 0 0 / 0.4);
      filter: brightness(1.1);
    }

    .card-head { display: flex; justify-content: space-between; align-items: center; }
    .s-name { font-size: 22px; font-weight: 800; color: var(--accent-cyan); }
    .s-spread { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; }
    .p-pos { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); transition: all 0.3s; }
    .p-neg { color: var(--text-muted); }

    .mini-chart-strip { height: 40px; margin: 4px 0; position: relative; }
    canvas.strip-canvas { width: 100% !important; height: 100% !important; }

    .path-bubble {
      font-size: 10px; color: var(--text-secondary);
      background: oklch(1 0 0 / 0.05); padding: 8px 12px; border-radius: 8px;
      border-left: 3px solid var(--accent-cyan);
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed; inset: 0; background: oklch(0 0 0 / 0.85);
      backdrop-filter: blur(12px); z-index: 200;
      display: none; align-items: center; justify-content: center;
      padding: 24px; animation: modalFadeIn 0.3s ease;
    }
    @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    .modal-win {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; width: 100%; max-width: 1000px;
      max-height: 90vh; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 80px oklch(0 0 0 / 0.6);
    }

    .modal-h {
      padding: 24px 32px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-t { font-size: 28px; font-weight: 800; color: var(--accent-cyan); letter-spacing: -1px; }
    .x-btn { 
      background: var(--bg-deep); border: 1px solid var(--border); 
      color: var(--text-primary); width: 36px; height: 36px; border-radius: 10px;
      cursor: pointer; font-size: 20px; transition: 0.2s;
    }
    .x-btn:hover { background: var(--bg-hover); color: var(--accent-red); border-color: var(--accent-red); }

    .modal-content { 
      padding: 32px; overflow-y: auto; 
      display: grid; grid-template-columns: 1fr 320px; gap: 32px;
    }

    .analytic-pane { display: flex; flex-direction: column; gap: 24px; }
    .label-tag { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }

    .big-chart-box {
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: 16px; height: 280px; width: 100%; padding: 16px;
      position: relative;
    }

    .depth-view { display: flex; flex-direction: column; gap: 16px; }
    .depth-item { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .depth-tbl { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .depth-tbl th { text-align: left; font-size: 9px; color: var(--text-muted); padding-bottom: 6px; }
    .depth-tbl td { padding: 3px 0; }
    .c-bid { color: var(--accent-green); }
    .c-ask { color: var(--accent-red); }
    .c-qty { opacity: 0.5; text-align: right; }

    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .stat-box { 
      background: var(--bg-deep); border: 1px solid var(--border); 
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .stat-v { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 800; }

    @media (max-width: 900px) {
      .modal-content { grid-template-columns: 1fr; }
      .container { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">△</div>
      <h1>OmniArb <span style="font-weight: 300; opacity: 0.5;">INTELLIGENCE</span></h1>
    </div>
    <div class="top-bar">
      <div class="stat-pill"><div class="status-dot" id="statusDot"></div><span id="statusLabel">Syncing</span></div>
      <div class="stat-pill">Lat: <span id="latencyVal">--ms</span></div>
      <div class="stat-pill">Cycles: <span id="cycleVal">0</span></div>
    </div>
  </header>

  <div class="container">
    <div id="emptyState" style="text-align: center; padding: 100px; color: var(--text-muted); font-size: 14px;">
      Fetching real-time market snapshots...
    </div>
    <div class="symbol-grid" id="symbolGrid"></div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-win">
      <div class="modal-h">
        <div class="modal-t" id="modalTitle">ASSET INTELLIGENCE</div>
        <button class="x-btn" onclick="closeModal()">×</button>
      </div>
      <div class="modal-content">
        <div class="analytic-pane">
          <div>
            <div class="label-tag">Spread Performance History</div>
            <div class="big-chart-box">
              <canvas id="modalChart"></canvas>
            </div>
          </div>
          
          <div class="stat-row">
            <div class="stat-box">
              <div class="label-tag">NET SPREAD</div>
              <div class="stat-v p-pos" id="mNetVal">0.00%</div>
            </div>
            <div class="stat-box">
              <div class="label-tag">GROSS SPREAD</div>
              <div class="stat-v" id="mGrossVal">0.00%</div>
            </div>
          </div>

          <div>
            <div class="label-tag">Execution Strategy</div>
            <div class="path-bubble" id="mPath" style="font-size: 13px; padding: 16px;">--</div>
          </div>
        </div>

        <div class="depth-view">
          <div class="label-tag">Market Liquidity</div>
          <div class="depth-item">
            <div class="label-tag" id="mD1Title" style="font-size: 9px; margin-bottom:8px;">PAIR 1</div>
            <table class="depth-tbl" id="mDepth1"></table>
          </div>
          <div class="depth-item">
            <div class="label-tag" id="mD2Title" style="font-size: 9px; margin-bottom:8px;">PAIR 2</div>
            <table class="depth-tbl" id="mDepth2"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const symbolGrid = document.getElementById('symbolGrid');
    const emptyState = document.getElementById('emptyState');
    const modalOverlay = document.getElementById('modalOverlay');
    const es = new EventSource('/events');

    const historySize = 60;
    const allHistory = {}; // symbol -> spread array
    let activeSymbol = null;
    let firstUpdate = true;

    es.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (firstUpdate) {
        emptyState.style.display = 'none';
        firstUpdate = false;
      }

      document.getElementById('statusLabel').textContent = data.status;
      document.getElementById('statusDot').style.background = data.status === 'Active' ? 'var(--accent-green)' : 'var(--accent-red)';
      document.getElementById('latencyVal').textContent = data.last_latency;
      document.getElementById('cycleVal').textContent = data.cycle_count;

      const symbols = data.symbols;
      
      Object.keys(symbols).forEach(s => {
        // Record History
        if (!allHistory[s]) allHistory[s] = [];
        allHistory[s].push(symbols[s].net.profit_pct);
        if (allHistory[s].length > historySize) allHistory[s].shift();

        // Update Grid
        let card = document.getElementById(`card-${s}`);
        if (!card) {
          card = document.createElement('div');
          card.id = `card-${s}`;
          card.className = 'symbol-card';
          card.onclick = () => openModal(s);
          symbolGrid.appendChild(card);
        }
        updateCardUI(card, s, symbols[s]);
      });

      if (activeSymbol && symbols[activeSymbol]) {
        updateModalUI(activeSymbol, symbols[activeSymbol]);
      }
    };

    function updateCardUI(card, symbol, data) {
      const net = data.net;
      const profit = net.profit_pct;
      const sClass = profit > 0 ? 'p-pos' : 'p-neg';
      
      const depth = net.depth || {};
      const s_inr = depth[`${symbol}/INR`] || {bids:[], asks:[]};

      card.innerHTML = `
        <div class="card-head">
          <div class="s-name">${symbol}</div>
          <div class="s-spread ${sClass}">${(profit > 0 ? '+' : '') + profit.toFixed(4)}%</div>
        </div>
        <div class="mini-chart-strip">
          <canvas id="strip-${symbol}" class="strip-canvas"></canvas>
        </div>
        <div class="path-bubble">
          ${net.direction.split(' -> ').join(' ➜ ')}
        </div>
        <div style="font-family:'JetBrains Mono'; font-size:10px; color:var(--text-muted); text-align:right;">
          INR: ₹${Number(s_inr.bids[0]?.[0] || 0).toLocaleString()}
        </div>
      `;
      
      // Draw mini strip
      drawSparkline(`strip-${symbol}`, allHistory[symbol]);
    }

    function drawSparkline(id, history) {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      canvas.width = w * 2; canvas.height = h * 2;
      ctx.scale(2, 2);
      ctx.clearRect(0,0,w,h);

      if (history.length < 2) return;
      
      ctx.beginPath();
      ctx.strokeStyle = 'oklch(0.78 0.15 195 / 0.4)';
      ctx.lineWidth = 1;
      const step = w / (historySize - 1);
      
      const max = Math.max(...history, 0.01);
      const min = Math.min(...history, -0.01);
      const range = max - min;

      history.forEach((v, i) => {
        const x = i * step;
        const y = h - ((v - min) / range) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function openModal(symbol) {
      activeSymbol = symbol;
      document.getElementById('modalTitle').textContent = `${symbol} Market Intelligence`;
      modalOverlay.style.display = 'flex';
      // Initial draw
      setTimeout(() => renderModalChart(symbol), 50);
    }

    function closeModal() {
      activeSymbol = null;
      modalOverlay.style.display = 'none';
    }

    function updateModalUI(symbol, data) {
      const net = data.net;
      const gross = data.gross;
      
      document.getElementById('mPath').textContent = net.direction.split(' -> ').join(' ➜ ');
      const netV = document.getElementById('mNetVal');
      netV.textContent = (net.profit_pct > 0 ? '+' : '') + net.profit_pct.toFixed(4) + '%';
      netV.className = 'stat-v ' + (net.profit_pct > 0 ? 'p-pos' : 'p-neg');
      document.getElementById('mGrossVal').textContent = gross.profit_pct.toFixed(4) + '%';

      document.getElementById('mD1Title').textContent = `${symbol} / INR`;
      document.getElementById('mD2Title').textContent = `${symbol} / USDT`;
      
      renderDepth('mDepth1', net.depth[`${symbol}/INR`] || {bids:[], asks:[]});
      renderDepth('mDepth2', net.depth[`${symbol}/USDT`] || {bids:[], asks:[]});
      
      renderModalChart(symbol);
    }

    function renderModalChart(symbol) {
      const canvas = document.getElementById('modalChart');
      const history = allHistory[symbol] || [];
      if (!canvas || !history.length) return;
      
      const ctx = canvas.getContext('2d');
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      canvas.width = w * 2; canvas.height = h * 2;
      ctx.scale(2, 2);
      ctx.clearRect(0, 0, w, h);

      const max = Math.max(...history, 0.05);
      const min = Math.min(...history, -0.05);
      const range = max - min;
      const step = w / (historySize - 1);

      // Grid
      ctx.strokeStyle = 'oklch(0.25 0.02 260)';
      ctx.lineWidth = 0.5;
      const zeroY = h - ((0 - min) / range) * h;
      ctx.beginPath(); ctx.moveTo(0, zeroY); ctx.lineTo(w, zeroY); ctx.stroke();

      // Line
      const grad = ctx.createLinearGradient(0,0,w,0);
      grad.addColorStop(0, 'var(--accent-purple)');
      grad.addColorStop(1, 'var(--accent-cyan)');
      
      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      history.forEach((v, i) => {
        const x = i * step;
        const y = h - ((v - min) / range) * h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Fill
      ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
      const fill = ctx.createLinearGradient(0, 0, 0, h);
      fill.addColorStop(0, 'oklch(0.78 0.15 195 / 0.1)');
      fill.addColorStop(1, 'oklch(0.78 0.15 195 / 0)');
      ctx.fillStyle = fill; ctx.fill();
    }

    function renderDepth(id, book) {
      const tbl = document.getElementById(id);
      const asks = (book.asks || []).slice(0, 5).reverse();
      const bids = (book.bids || []).slice(0, 5);
      let h = '<tr><th>Price</th><th class="c-qty">Qty</th></tr>';
      asks.forEach(a => h += `<tr class="c-ask"><td>${Number(a[0]).toLocaleString()}</td><td class="c-qty">${Number(a[1]).toFixed(4)}</td></tr>`);
      h += `<tr><td colspan="2" style="border-bottom:1px dashed var(--border); height:4px;"></td></tr>`;
      bids.forEach(b => h += `<tr class="c-bid"><td>${Number(b[0]).toLocaleString()}</td><td class="c-qty">${Number(b[1]).toFixed(4)}</td></tr>`);
      tbl.innerHTML = h;
    }

    window.onclick = (e) => { if (e.target == modalOverlay) closeModal(); };
    es.onerror = () => { document.getElementById('statusLabel').textContent = 'Disconnected'; };
  </script>
</body>
</html>
